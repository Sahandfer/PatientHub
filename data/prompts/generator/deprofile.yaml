en:
  symptom_extract: |
    You are a social-media symptom/experience information extraction expert. Below is a tweet related to "{{ label }}":

    Text: {{ tweet }}

    Task: Decide whether this tweet contains a symptom, subjective distress, or functional impairment that is meaningful to the user and personally experienced by / directly relevant to them.

    If it does not (e.g., it only comments on or labels/insults others, recounts someone else's experience, shows no clear physical or mental experience, or is pure venting with no bodily/behavioral/functional sign), return is_meaningful=false.
    If it does, extract one "symptom triple" and a short summary.

    Requirements:
    1) Keep the triple close to the text; do not invent details (specific body part, frequency, cause, duration, etc.) unless the text states them.
    2) Prefer "I / the user" as the subject. If the text is clearly someone else's experience and unrelated to the user, mark it not meaningful.
    3) Prefer a predicate such as "experiences / feels / is affected by / struggles with"; pick the one closest to the text.
    4) The object must be a concrete symptom/experience phrase, not just the label "{{ label }}". You may use "{{ label }}" as a semantic constraint: if the tweet is entirely inconsistent with "{{ label }}", mark it not meaningful.
    5) Summarize the symptom experience in one short sentence (~25 words max); no diagnosis name, no explanation.
  life_event_extract: |
    You are a social-media event information extraction expert. Below is a tweet related to "{{ label }}":

    Text: {{ tweet }}

    Task: Decide whether this tweet contains a life event that is meaningful to the user and personally experienced by / directly relevant to them.

    If it does not (e.g., it only comments on or labels/insults others, recounts someone else's experience, mentions no clear event, or is pure venting with no event), return is_meaningful=false.
    If it does, extract one "event triple" and a short summary.

    Requirements:
    1) Keep the triple close to the text; do not invent details (people, places, time, or causes).
    2) Prefer "I / the user" as the subject. If the text is clearly someone else's and unrelated to the user, mark it not meaningful.
    3) Summarize the event in one short sentence (~25 words max).
  memory_card: |
    {%- set start_text = relative(episode.time_range.days_ago_start) -%}
    {%- set end_text = relative(episode.time_range.days_ago_end) -%}
    {%- if episode.time_range.days_ago_start == episode.time_range.days_ago_end -%}
    {{ relative(episode.time_range.days_ago_start) }}
    {%- else -%}
    {{ start_text }}~{{ end_text }}
    {%- endif -%}:
    {%- if card_items -%}
    {%- for item in card_items -%}
    {%- if not loop.first %}; {% endif -%}
    {%- if item.text -%}{{ item.text }}
    {%- elif item.node_type == "Symptom" and item.symptom -%}<I> <experience> <{{ item.symptom }}>
    {%- elif item.life_event -%}{{ item.life_event }}
    {%- else -%}no valid information
    {%- endif -%}
    {%- endfor -%}
    {%- else -%}no valid information
    {%- endif -%}
    {%- set representative_text = relative(representative.time_norm.days_ago) -%}
    . Representative time point: {{ representative_text }} ({{ representative.time_norm.days_ago }} day{% if representative.time_norm.days_ago != 1 %}s{% endif %} ago).
zh:
  symptom_extract: |
    你是一名社交媒体【症状/体验信息】抽取专家。下面是一条与【{{ label }}】相关的推文：

    文本：{{ tweet }}

    任务：判断这条推文是否包含“对用户本人有意义、且由用户亲身体验/直接相关”的症状、主观不适或功能受损。

    如果不包含（例如：只是评价别人、辱骂/标签化他人、转述他人经历、无明确身心体验、纯情绪宣泄但没有任何身心/行为/功能表现），请返回 is_meaningful=false。
    如果包含，请抽取一个“症状三元组”，并给出一句简短摘要。

    要求：
    1) 三元组要尽量贴近原文，不要编造细节（具体部位/频率/原因/持续时间等），除非原文明确提到。
    2) 主体优先用“我/用户本人”。如果原文明显是他人的体验且与用户无关，则标记为不 meaningful。
    3) 谓语优先用“出现/感到/受到影响/难以进行”。选择最贴近原文的一个。
    4) 宾语必须是更具体的症状/体验短语，不要只输出 {{ label }} 这个标签名。可以把 {{ label }} 作为语义约束：如果 tweet 内容与 {{ label }} 完全不一致，则标记为不 meaningful。
    5) summary 用一句话概括症状体验（不超过25个汉字），不要写诊断名，不要科普。
  life_event_extract: |
    你是一名社交媒体事件信息抽取专家。下面是一条与【{{ label }}】相关的推文：

    文本：{{ tweet }}

    任务：判断这条推文是否包含“对用户本人有意义、且由用户亲身经历/直接相关”的生活事件。

    如果不包含（例如：只是评价别人、辱骂/标签化他人、转述他人经历、无明确事件、纯情绪宣泄且无事件），请返回 is_meaningful=false。
    如果包含，请抽取一个“事件三元组”，并给出一句简短摘要。

    要求：
    1) 三元组要尽量贴近原文，不要编造细节（人物/地点/时间/原因）。
    2) 主体优先用“我/用户本人”。如果原文明确是他人且与用户无关，则标记为不 meaningful。
    3) summary 用一句话概括事件（不超过25个汉字）。
  memory_card: |
    {%- set start_text = relative(episode.time_range.days_ago_start) -%}
    {%- set end_text = relative(episode.time_range.days_ago_end) -%}
    {%- if episode.time_range.days_ago_start == episode.time_range.days_ago_end -%}
    {{ relative(episode.time_range.days_ago_start) }}
    {%- else -%}
    {{ start_text }}~{{ end_text }}
    {%- endif -%}：
    {%- if card_items -%}
    {%- for item in card_items -%}
    {%- if not loop.first %}；{% endif -%}
    {%- if item.text -%}{{ item.text }}
    {%- elif item.node_type == "Symptom" and item.symptom -%}<我> <出现> <{{ item.symptom }}>
    {%- elif item.life_event -%}{{ item.life_event }}
    {%- else -%}无有效信息
    {%- endif -%}
    {%- endfor -%}
    {%- else -%}无有效信息
    {%- endif -%}
    {%- set representative_text = relative(representative.time_norm.days_ago) -%}
    。代表时间点：{{ representative_text }}（{{ representative.time_norm.days_ago }}天前）。
